name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  linux-validation:
    name: Linux full validation
    runs-on: ubuntu-24.04
    timeout-minutes: 40
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.14.4
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14.4
          cache: false
      - name: Set up Node 24.15.0
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 24.15.0
          package-manager-cache: false
      - name: Install locked backend environment
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.lock
          python -m pip install --disable-pip-version-check --no-deps -e backend
      - name: Install locked frontend environment
        working-directory: frontend
        run: npm ci
      - name: Backend static analysis
        run: |
          python -m ruff format --check backend
          python -m ruff check backend
          python -m mypy --config-file backend/pyproject.toml backend/src backend/tests
      - name: Repository, lock, import, workflow, and migration audits
        run: python -m musimack_tools.ci all --repository-root .
      - name: Full backend regression
        run: python -m pytest -c backend/pyproject.toml
      - name: Installed dependency audit
        run: python -m pip check
      - name: Frontend static analysis and regression
        working-directory: frontend
        run: |
          npm run format:check
          npm run lint
          npm run typecheck
          npm run test
          npm run build
          npm audit --offline
          npm audit --offline --omit=dev
      - name: Post-build secret and artifact audit
        run: |
          python -m musimack_tools.ci repository --repository-root . --allow frontend/dist
          git diff --check
          test -z "$(git status --porcelain --untracked-files=all)"

  windows-filesystem:
    name: Windows filesystem and symlink validation
    needs: linux-validation
    runs-on: windows-2025
    timeout-minutes: 25
    steps:
      - name: Check out exact source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Set up Python 3.14.4
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: 3.14.4
          cache: false
      - name: Install locked backend environment
        shell: pwsh
        run: |
          python -m pip install --disable-pip-version-check -r backend/requirements.lock
          python -m pip install --disable-pip-version-check --no-deps -e backend
      - name: Run Windows path, junction, backup, and packaging tests
        shell: pwsh
        run: >-
          python -m pytest -c backend/pyproject.toml
          backend/tests/unit/test_sitemap_publication.py
          backend/tests/unit/test_release_candidate.py
          backend/tests/integration/test_production_operations.py
      - name: Confirm repository remains unchanged
        shell: pwsh
        run: |
          git diff --check
          if (git status --porcelain --untracked-files=all) { throw 'Validation changed the checkout.' }
